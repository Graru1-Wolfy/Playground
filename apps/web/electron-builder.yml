appId: com.playground.tf2bouncechecker
productName: TF2 Bounce Checker
detectUpdateChannel: false
publish: []
directories:
  output: release/electron
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraResources:
  - from: ../../packages/engine-sim
    to: packages/engine-sim
    filter:
      - src/**/*
      - pyproject.toml
  - from: ../../packages/tf2sim
    to: packages/tf2sim
    filter:
      - src/**/*
      - pyproject.toml
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: TF2-Bounce-Checker-Setup-${version}.${ext}
nsis:
  guid: com.playground.tf2bouncechecker
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TF2 Bounce Checker
  deleteAppDataOnUninstall: false
