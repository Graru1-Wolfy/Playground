name: Android Release APK

on:
  push:
    tags:
      - "bounce-check-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (optional, e.g. bounce-check-v1.0.1)"
        required: false

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Android SDK
        run: bash scripts/setup-android-sdk.sh

      - name: Build signed release APK
        run: bash scripts/build-android-apk.sh release
        env:
          ANDROID_HOME: /opt/android-sdk

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bounce-check-apk
          path: apps/web/android/app/build/outputs/apk/release/app-release.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/bounce-check-v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/web/android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
