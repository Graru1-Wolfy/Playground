name: engine-fast

on:
  push:
    paths:
      - "packages/engine-fast/**"
      - ".github/workflows/engine-fast.yml"
  pull_request:
    paths:
      - "packages/engine-fast/**"
      - ".github/workflows/engine-fast.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/engine-fast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/engine-fast/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
