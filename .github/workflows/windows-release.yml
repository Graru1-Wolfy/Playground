name: Windows Release EXE

on:
  push:
    tags:
      - "bounce-check-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (optional, e.g. bounce-check-v1.0.18)"
        required: false

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and build portable EXE
        shell: bash
        run: bash scripts/build-windows-exe.sh

      - name: Resolve EXE path
        id: exe
        shell: bash
        run: |
          VERSION="$(grep 'versionName "' apps/web/android/app/build.gradle | head -1 | sed 's/.*versionName "\([^"]*\)".*/\1/')"
          echo "path=apps/web/release/bounce-check-v${VERSION}.exe" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bounce-check-exe
          path: ${{ steps.exe.outputs.path }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/bounce-check-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.exe.outputs.path }}
          generate_release_notes: true
