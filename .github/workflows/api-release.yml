name: API Release

on:
  push:
    tags:
      - "bounce-api-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Build and package API
        run: |
          npm ci
          bash scripts/package-api-release.sh

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/bounce-api-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/bounce-api-v*.tar.gz
          generate_release_notes: true
