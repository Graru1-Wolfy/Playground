name: Native App Release

on:
  push:
    branches:
      - "**"
    paths:
      - "apps/web/**"
      - "packages/engine-fast/**"
      - "packages/schema/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/native-release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: native-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      make_latest: ${{ steps.version.outputs.make_latest }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - id: version
        name: Compute release version
        shell: bash
        run: |
          version="$(node -p "require('./apps/web/package.json').version")"
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g')"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            tag="native-v${version}.${GITHUB_RUN_NUMBER}"
            prerelease="false"
            make_latest="true"
          else
            tag="native-${ref_slug}-v${version}.${GITHUB_RUN_NUMBER}"
            prerelease="true"
            make_latest="false"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "make_latest=${make_latest}" >> "${GITHUB_OUTPUT}"

  windows:
    needs: metadata
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: |
          npm run build:packages
          npm run dist:win

      - name: Stage Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $installer = Get-ChildItem -Path apps/web/release/electron -Filter *.exe | Select-Object -First 1
          Copy-Item $installer.FullName "artifacts/TF2-Bounce-Checker-${{ needs.metadata.outputs.tag }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: artifacts/*.exe

  android:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        run: |
          npm run build:packages
          npm run android:sync
          cd apps/web/android
          ./gradlew assembleDebug \
            -PandroidVersionName="${{ needs.metadata.outputs.version }}.${GITHUB_RUN_NUMBER}" \
            -PandroidVersionCode="${GITHUB_RUN_NUMBER}"

      - name: Stage Android artifact
        run: |
          mkdir -p artifacts
          cp apps/web/android/app/build/outputs/apk/debug/app-debug.apk \
            "artifacts/TF2-Bounce-Checker-${{ needs.metadata.outputs.tag }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/*.apk

  release:
    needs:
      - metadata
      - windows
      - android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: TF2 Bounce Checker ${{ needs.metadata.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.metadata.outputs.prerelease }}
          make_latest: ${{ needs.metadata.outputs.make_latest }}
          files: artifacts/*
